services:
  db:
    image: postgres:17
    container_name: texttosql_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: texttosql
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d texttosql"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: texttosql_app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: